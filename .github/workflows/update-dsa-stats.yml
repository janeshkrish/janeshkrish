name: Update DSA Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate DSA stats JSON
        run: node scripts/update-dsa-stats.js

      - name: Commit and push when changed
        run: |
          if git diff --quiet -- dsa-stats.json; then
            echo "No stats changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dsa-stats.json
          git commit -m "chore: update DSA stats"
          git push
